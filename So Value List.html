<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: rgba(20, 30, 50, 0.8);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .admin-btn, .settings-btn, .reset-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .admin-btn:hover, .settings-btn:hover, .reset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .settings-btn {
            background: rgba(147, 51, 234, 0.2);
            border-color: rgba(147, 51, 234, 0.5);
        }

        .settings-btn:hover {
            background: rgba(147, 51, 234, 0.3);
            border-color: rgba(147, 51, 234, 0.7);
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            display: none;
        }

        body.admin-mode .reset-btn {
            display: block;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.7);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab {
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            padding: 15px 30px;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
        }

        .tab:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(251, 191, 36, 0.3);
        }

        .tab.active {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            color: #fbbf24;
        }

        .tab-delete {
            margin-left: 10px;
            color: #fca5a5;
            font-weight: bold;
            display: none;
        }

        .admin-mode .tab-delete {
            display: inline;
        }

        .category-section {
            display: none;
        }

        .category-section.active {
            display: block;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 28px;
            font-weight: bold;
            color: #fbbf24;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .item-card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .item-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .item-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .item-name {
            font-size: 22px;
            font-weight: bold;
            color: #fbbf24;
            text-align: center;
            margin-bottom: 15px;
        }

        .item-value {
            font-size: 16px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 15px;
        }

        .item-details {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .item-details div {
            margin-bottom: 8px;
        }

        .label {
            font-weight: bold;
            color: #fbbf24;
        }

        .delete-item-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(239, 68, 68, 0.8);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }
        
        body:not(.admin-mode) .delete-item-btn {
            display: none;
        }
        
        .admin-mode .delete-item-btn {
            display: flex;
        }

        .delete-item-btn:hover {
            background: rgba(220, 38, 38, 1);
        }

        .add-item-btn {
            background: rgba(34, 197, 94, 0.2);
            border: 2px dashed rgba(34, 197, 94, 0.5);
            color: #86efac;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        body:not(.admin-mode) .add-item-btn {
            display: none;
        }

        .add-item-btn:hover {
            background: rgba(34, 197, 94, 0.3);
            border-color: rgba(34, 197, 94, 0.7);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #fbbf24;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 14px;
        }

        .form-group input[type="color"] {
            height: 50px;
            cursor: pointer;
        }

        .color-preview {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .color-item {
            flex: 1;
        }

        .color-item label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .form-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-submit {
            background: #22c55e;
            color: white;
        }

        .btn-submit:hover {
            background: #16a34a;
        }

        .btn-cancel {
            background: rgba(239, 68, 68, 0.8);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(220, 38, 38, 1);
        }

        .add-category-section {
            text-align: center;
            margin: 40px 0;
        }
        
        body:not(.admin-mode) .add-category-section {
            display: none;
        }

        .add-category-btn {
            background: rgba(147, 51, 234, 0.3);
            border: 2px dashed rgba(147, 51, 234, 0.6);
            color: #c084fc;
            padding: 20px 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .add-category-btn:hover {
            background: rgba(147, 51, 234, 0.4);
            border-color: rgba(147, 51, 234, 0.8);
        }

        .admin-mode .delete-item-btn,
        .admin-mode .add-item-btn,
        .admin-mode .add-category-section,
        .admin-mode .delete-category-btn {
            display: flex !important;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            animation: fadeInOut 2s;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" id="logoText">MY ITEMS</div>
        <div class="header-buttons">
            <button class="reset-btn" onclick="resetData()">🔄 Reset Data</button>
            <button class="settings-btn" onclick="showSettingsModal()">⚙️ Settings</button>
            <button class="admin-btn" onclick="toggleAdminMode()">Admin Mode</button>
        </div>
    </div>

    <div class="container" id="container">
        <div class="tabs-container" id="tabsContainer"></div>
        <div id="categoriesContainer"></div>
        <div class="add-category-section">
            <button class="add-category-btn" onclick="showAddCategoryModal()">+ Add New Category</button>
        </div>
    </div>

    <div class="save-indicator" id="saveIndicator">✓ Saved!</div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-title" id="loginModalTitle">Admin Login</div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <div class="form-buttons">
                <button class="btn-submit" onclick="checkPassword()">Login</button>
                <button class="btn-cancel" onclick="closeModal('loginModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Item Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-title" id="itemModalTitle">Add New Item</div>
            <div class="form-group">
                <label>Category</label>
                <select id="itemCategory"></select>
            </div>
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="itemName" placeholder="Enter item name">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" id="itemImage" placeholder="Enter image URL">
            </div>
            <div class="form-group">
                <label>Value</label>
                <input type="text" id="itemValue" placeholder="e.g., 52,000">
            </div>
            <div class="form-group">
                <label>Demand</label>
                <input type="text" id="itemDemand" placeholder="e.g., High, Good, Very High">
            </div>
            <div class="form-group">
                <label>Origin</label>
                <input type="text" id="itemOrigin" placeholder="e.g., Premium Crate, Gift from Staff">
            </div>
            <div class="form-group">
                <label>Supply</label>
                <input type="text" id="itemSupply" placeholder="e.g., Scarce, Very Low">
            </div>
            <div class="form-group">
                <label>Obtainable</label>
                <select id="itemObtainable">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-buttons">
                <button class="btn-submit" onclick="saveItem()">Save Item</button>
                <button class="btn-cancel" onclick="closeModal('itemModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-title">Add New Category</div>
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" id="categoryName" placeholder="Enter category name">
            </div>
            <div class="form-buttons">
                <button class="btn-submit" onclick="saveCategory()">Add Category</button>
                <button class="btn-cancel" onclick="closeModal('categoryModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-title">Settings</div>
            <div class="form-group">
                <label>Website Title</label>
                <input type="text" id="settingsTitle" placeholder="Enter website title">
            </div>
            <div class="form-group">
                <label>Primary Color (Background Gradient Start)</label>
                <input type="color" id="colorPrimary" value="#1e3c72">
            </div>
            <div class="form-group">
                <label>Secondary Color (Background Gradient Mid)</label>
                <input type="color" id="colorSecondary" value="#2a5298">
            </div>
            <div class="form-group">
                <label>Accent Color (Background Gradient End)</label>
                <input type="color" id="colorAccent" value="#7e22ce">
            </div>
            <div class="form-group">
                <label>Highlight Color (Titles & Active Elements)</label>
                <input type="color" id="colorHighlight" value="#fbbf24">
            </div>
            <div class="form-buttons">
                <button class="btn-submit" onclick="saveSettings()">Save Settings</button>
                <button class="btn-cancel" onclick="closeModal('settingsModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Hashed passwords (SHA-256)
        const PASSWORD_HASHES = {
            admin: "1f9c2594d92f43bbf4926cdb68ad720deb202c5a194ca74da9bdffd9a4833738", //
            settings: "6a7b5cd49aae82b182a96bb66eb09da111aa9c46c32ec7c31eb6409ca05ed142" //
        };
        
        let isAdminMode = false;
        let isSettingsUnlocked = false;
        let currentEditingItem = null;
        let activeCategory = null;
        let currentLoginType = null;

        // Default data
        const DEFAULT_DATA = {
            categories: [
                {
                    id: 1,
                    name: "Accessories",
                    items: [
                        {
                            id: 1,
                            name: "Cape Bag",
                            image: "",
                            value: "52,000",
                            demand: "High",
                            origin: "Premium Crate",
                            supply: "Scarce",
                            obtainable: "No"
                        },
                        {
                            id: 2,
                            name: "Celestial Chakram",
                            image: "",
                            value: "26,500",
                            demand: "Very High",
                            origin: "Premium Crate",
                            supply: "Scarce",
                            obtainable: "No"
                        }
                    ]
                },
                {
                    id: 2,
                    name: "Weapons",
                    items: [
                        {
                            id: 3,
                            name: "Dual Bayonet",
                            image: "",
                            value: "22,500",
                            demand: "Very High",
                            origin: "Premium Crate",
                            supply: "Scarce",
                            obtainable: "Yes"
                        }
                    ]
                }
            ]
        };

        const DEFAULT_SETTINGS = {
            title: "MY ITEMS",
            colorPrimary: "#1e3c72",
            colorSecondary: "#2a5298",
            colorAccent: "#7e22ce",
            colorHighlight: "#fbbf24"
        };

        // Load data from localStorage or use defaults
        let data = JSON.parse(localStorage.getItem('itemManagerData')) || DEFAULT_DATA;
        let settings = JSON.parse(localStorage.getItem('itemManagerSettings')) || DEFAULT_SETTINGS;

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('itemManagerData', JSON.stringify(data));
            showSaveIndicator();
        }

        function saveSettingsToStorage() {
            localStorage.setItem('itemManagerSettings', JSON.stringify(settings));
            showSaveIndicator();
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }

        function resetData() {
            if (confirm('⚠️ WARNING: This will delete ALL your data and reset to defaults. This cannot be undone!\n\nAre you sure you want to continue?')) {
                if (confirm('Are you REALLY sure? This will delete everything!')) {
                    localStorage.removeItem('itemManagerData');
                    localStorage.removeItem('itemManagerSettings');
                    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
                    activeCategory = null;
                    renderData();
                    applySettings();
                    alert('✓ Data has been reset to defaults!');
                }
            }
        }

        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        function toggleAdminMode() {
            if (!isAdminMode) {
                currentLoginType = 'admin';
                document.getElementById('loginModalTitle').textContent = 'Admin Login';
                document.getElementById('loginModal').style.display = 'flex';
            } else {
                isAdminMode = false;
                document.body.classList.remove('admin-mode');
                document.querySelector('.admin-btn').textContent = 'Admin Mode';
            }
        }

        async function checkPassword() {
            const password = document.getElementById('loginPassword').value;
            const hashedPassword = await hashPassword(password);
            
            if (currentLoginType === 'admin' && hashedPassword === PASSWORD_HASHES.admin) {
                isAdminMode = true;
                document.body.classList.add('admin-mode');
                document.querySelector('.admin-btn').textContent = 'Exit Admin';
                closeModal('loginModal');
                document.getElementById('loginPassword').value = '';
            } else if (currentLoginType === 'settings' && hashedPassword === PASSWORD_HASHES.settings) {
                isSettingsUnlocked = true;
                closeModal('loginModal');
                document.getElementById('loginPassword').value = '';
                showSettingsModal();
            } else {
                alert('Incorrect password!');
                document.getElementById('loginPassword').value = '';
            }
        }

        function renderData() {
            const tabsContainer = document.getElementById('tabsContainer');
            const categoriesContainer = document.getElementById('categoriesContainer');
            
            tabsContainer.innerHTML = '';
            categoriesContainer.innerHTML = '';

            if (!activeCategory && data.categories.length > 0) {
                activeCategory = data.categories[0].id;
            }

            data.categories.forEach(category => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (category.id === activeCategory ? ' active' : '');
                tab.innerHTML = `
                    ${category.name}
                    <span class="tab-delete" onclick="event.stopPropagation(); deleteCategory(${category.id})">×</span>
                `;
                tab.onclick = () => switchTab(category.id);
                tabsContainer.appendChild(tab);
            });

            data.categories.forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section' + (category.id === activeCategory ? ' active' : '');
                section.id = `category-section-${category.id}`;
                section.innerHTML = `
                    <div class="items-grid" id="category-${category.id}"></div>
                `;
                categoriesContainer.appendChild(section);

                const grid = document.getElementById(`category-${category.id}`);
                
                category.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <button class="delete-item-btn" onclick="deleteItem(${category.id}, ${item.id})">×</button>
                        <div class="item-image">
                            ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '📦'}
                        </div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-value">Value: ${item.value}</div>
                        <div class="item-details">
                            <div><span class="label">Demand:</span> ${item.demand}</div>
                            <div><span class="label">Origin:</span> ${item.origin}</div>
                            <div><span class="label">Supply:</span> ${item.supply}</div>
                            <div><span class="label">Obtainable:</span> ${item.obtainable}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                const addCard = document.createElement('div');
                addCard.className = 'item-card add-item-btn';
                addCard.onclick = () => showAddItemModal(category.id);
                addCard.textContent = '+';
                grid.appendChild(addCard);
            });
        }

        function switchTab(categoryId) {
            activeCategory = categoryId;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            document.querySelectorAll('.category-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(`category-section-${categoryId}`).classList.add('active');
        }

        function showAddItemModal(categoryId) {
            currentEditingItem = { categoryId, itemId: null };
            document.getElementById('itemModalTitle').textContent = 'Add New Item';
            
            const categorySelect = document.getElementById('itemCategory');
            categorySelect.innerHTML = '';
            data.categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                option.selected = cat.id === categoryId;
                categorySelect.appendChild(option);
            });

            document.getElementById('itemName').value = '';
            document.getElementById('itemImage').value = '';
            document.getElementById('itemValue').value = '';
            document.getElementById('itemDemand').value = '';
            document.getElementById('itemOrigin').value = '';
            document.getElementById('itemSupply').value = '';
            document.getElementById('itemObtainable').value = 'Yes';

            document.getElementById('itemModal').style.display = 'flex';
        }

        function saveItem() {
            const categoryId = parseInt(document.getElementById('itemCategory').value);
            const category = data.categories.find(c => c.id === categoryId);

            const newItem = {
                id: Date.now(),
                name: document.getElementById('itemName').value,
                image: document.getElementById('itemImage').value,
                value: document.getElementById('itemValue').value,
                demand: document.getElementById('itemDemand').value,
                origin: document.getElementById('itemOrigin').value,
                supply: document.getElementById('itemSupply').value,
                obtainable: document.getElementById('itemObtainable').value
            };

            category.items.push(newItem);
            saveData();
            closeModal('itemModal');
            renderData();
        }

        function deleteItem(categoryId, itemId) {
            if (confirm('Are you sure you want to delete this item?')) {
                const category = data.categories.find(c => c.id === categoryId);
                category.items = category.items.filter(i => i.id !== itemId);
                saveData();
                renderData();
            }
        }

        function showAddCategoryModal() {
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function saveCategory() {
            const name = document.getElementById('categoryName').value;
            if (name.trim()) {
                data.categories.push({
                    id: Date.now(),
                    name: name,
                    items: []
                });
                saveData();
                closeModal('categoryModal');
                renderData();
            }
        }

        function deleteCategory(categoryId) {
            if (confirm('Are you sure you want to delete this category and all its items?')) {
                data.categories = data.categories.filter(c => c.id !== categoryId);
                
                if (activeCategory === categoryId) {
                    activeCategory = data.categories.length > 0 ? data.categories[0].id : null;
                }
                
                saveData();
                renderData();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function showSettingsModal() {
            if (!isSettingsUnlocked) {
                currentLoginType = 'settings';
                document.getElementById('loginModalTitle').textContent = 'Settings Login';
                document.getElementById('loginModal').style.display = 'flex';
                return;
            }
            
            document.getElementById('settingsTitle').value = settings.title;
            document.getElementById('colorPrimary').value = settings.colorPrimary;
            document.getElementById('colorSecondary').value = settings.colorSecondary;
            document.getElementById('colorAccent').value = settings.colorAccent;
            document.getElementById('colorHighlight').value = settings.colorHighlight;
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function saveSettings() {
            settings.title = document.getElementById('settingsTitle').value;
            settings.colorPrimary = document.getElementById('colorPrimary').value;
            settings.colorSecondary = document.getElementById('colorSecondary').value;
            settings.colorAccent = document.getElementById('colorAccent').value;
            settings.colorHighlight = document.getElementById('colorHighlight').value;
            
            saveSettingsToStorage();
            applySettings();
            closeModal('settingsModal');
            
            isSettingsUnlocked = false;
        }

        function applySettings() {
            document.getElementById('logoText').textContent = settings.title;
            document.title = settings.title;
            
            document.body.style.background = `linear-gradient(135deg, ${settings.colorPrimary} 0%, ${settings.colorSecondary} 50%, ${settings.colorAccent} 100%)`;
            
            document.documentElement.style.setProperty('--highlight-color', settings.colorHighlight);
            
            const style = document.createElement('style');
            style.id = 'dynamic-colors';
            const existingStyle = document.getElementById('dynamic-colors');
            if (existingStyle) existingStyle.remove();
            
            style.textContent = `
                .category-title,
                .item-name,
                .label,
                .modal-title,
                .tab.active {
                    color: ${settings.colorHighlight} !important;
                }
                .tab.active {
                    border-color: ${settings.colorHighlight} !important;
                    background: ${settings.colorHighlight}33 !important;
                }
                .item-card:hover {
                    border-color: ${settings.colorHighlight}80 !important;
                }
            `;
            document.head.appendChild(style);
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        // Initial render
        renderData();
        applySettings();
    </script>
</body>
</html>
