<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ValueList.gg</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg1: #050c17;
    --bg2: #0a1628;
    --glass: rgba(255,255,255,0.04);
    --glass-hover: rgba(255,255,255,0.07);
    --glass-strong: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-bright: rgba(255,255,255,0.16);
    --text: #e8f2ff;
    --text-dim: rgba(232,242,255,0.55);
    --muted: rgba(255,255,255,0.3);
    --accent: #3d8eff;
    --admin: #ff6b35;
    --rising: #3ecf8e;
    --overpaid: #60b4f5;
    --fluctuating: #f59e0b;
    --stable: #66cc88;
    --declining: #e06c75;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg1);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ambient background orbs ── */
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    top: -200px; left: -150px;
    background: radial-gradient(circle, rgba(61,142,255,0.12) 0%, transparent 70%);
  }
  body::after {
    width: 500px; height: 500px;
    bottom: -150px; right: -100px;
    background: radial-gradient(circle, rgba(168,85,247,0.09) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  .header {
    background: rgba(5,12,23,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .admin-btn {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--admin);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .admin-btn:hover { background: rgba(255,107,53,0.2); }
  .admin-btn.active { background: var(--admin); color: #fff; border-color: var(--admin); }

  /* ── TABS ── */
  .tabs-wrap {
    background: rgba(5,12,23,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }

  .tab {
    padding: 13px 18px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
    letter-spacing: 0.3px;
  }
  .tab:hover { color: rgba(232,242,255,0.75); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 28px 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .search {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
  }
  .search:focus { border-color: rgba(61,142,255,0.5); background: var(--glass-hover); }
  .search::placeholder { color: var(--muted); }

  select.filt {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 9px 12px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    backdrop-filter: blur(8px);
  }
  select.filt:focus { border-color: rgba(61,142,255,0.5); }
  select.filt option { background: #0d1a2e; color: var(--text); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(195px, 195px));
    justify-items: center;
    justify-content: center;
    gap: 14px;
    padding: 10px 28px 48px;
    position: relative;
    z-index: 1;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    position: relative;
    cursor: default;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .card:hover {
    background: var(--glass-hover);
    border-color: var(--border-bright);
    transform: translateY(-2px);
  }

  .card-img {
    width: 76px;
    height: 76px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: contain; }

  .card-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.3px;
    color: #fff;
    -webkit-text-stroke: 0.4px rgba(0,0,0,0.6);
  }

  .card-value {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2px;
  }
  .card-value strong {
    color: rgba(232,242,255,0.85);
    font-weight: 500;
  }

  .card-stats {
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 10px;
    margin-top: 2px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11px;
  }
  .stat-row { display: flex; justify-content: space-between; align-items: center; }
  .stat-label { color: var(--muted); font-size: 10.5px; }

  /* ── RARITY GRADIENT TEXT ── */
  @property --angle {
    syntax: "<angle>";
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes spin-cw { to { --angle: 360deg; } }

  .rarity-text {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spin-cw 3s linear infinite;
  }
  .rarity-text.common    { background-image: conic-gradient(from var(--angle), #888, #ccc, #eee, #bbb, #888); }
  .rarity-text.uncommon  { background-image: conic-gradient(from var(--angle), #1a6b2a, #3ecf8e, #7dffc5, #3ecf8e, #1a6b2a); }
  .rarity-text.rare      { background-image: conic-gradient(from var(--angle), #0a3a8a, #2a7fff, #7ec8ff, #2a7fff, #0a3a8a); }
  .rarity-text.epic      { background-image: conic-gradient(from var(--angle), #3b0a6b, #a855f7, #d8a8ff, #a855f7, #3b0a6b); }
  .rarity-text.legendary { background-image: conic-gradient(from var(--angle), #7a4a00, #f5a623, #ffe58a, #f5a623, #7a4a00); }
  .rarity-text.mythic    { background-image: conic-gradient(from var(--angle), #7a2a00, #ff6b35, #ffb347, #ff6b35, #7a2a00); animation-duration: 2s; }
  .rarity-text.divine    { background-image: conic-gradient(from var(--angle), #7a1050, #e94fa0, #ffaadd, #e94fa0, #7a1050); animation-duration: 1.8s; }

  .stab-Rising     { color: var(--rising); }
  .stab-Overpaid   { color: var(--overpaid); }
  .stab-Fluctuating{ color: var(--fluctuating); }
  .stab-Stable     { color: var(--stable); }
  .stab-Declining  { color: var(--declining); }

  /* ── ADMIN CARD ACTIONS ── */
  .card-actions {
    position: absolute;
    top: 10px; right: 10px;
    display: none;
    gap: 5px;
  }
  .admin-mode .card:hover .card-actions { display: flex; }
  .card-act-btn {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    transition: all 0.15s;
  }
  .card-act-btn:hover { border-color: rgba(255,255,255,0.2); transform: scale(1.1); }
  .edit-btn { background: rgba(42,127,255,0.2); color: #7ec8ff; }
  .del-btn  { background: rgba(224,108,117,0.2); color: #f0a0a0; }

  /* ── EMPTY ── */
  .empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 4rem; font-size: 14px; }

  /* ── ADMIN PANEL ── */
  .admin-panel {
    background: rgba(255,107,53,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,107,53,0.2);
    padding: 10px 28px;
    display: none;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .admin-panel.open { display: flex; }
  .admin-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--admin);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .ap-btn {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 20px;
    color: rgba(255,150,100,0.9);
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    padding: 5px 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .ap-btn:hover { background: rgba(255,107,53,0.2); border-color: rgba(255,107,53,0.4); color: #ff8c60; }

  .ap-btn-blue {
    background: rgba(61,142,255,0.1);
    border-color: rgba(61,142,255,0.25);
    color: rgba(120,180,255,0.9);
  }
  .ap-btn-blue:hover { background: rgba(61,142,255,0.2); border-color: rgba(61,142,255,0.4); color: #7ec8ff; }

  /* ── CATEGORY CHIPS ── */
  .cat-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .cat-chip-del {
    background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 1px;
  }
  .cat-chip-del:hover { color: #e06c75; }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(3,8,18,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: rgba(10,18,35,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    animation: popIn 0.2s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
  }
  @keyframes popIn { from { transform: scale(0.93) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 22px;
    color: var(--text);
    letter-spacing: 0.4px;
  }

  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--muted);
    font-size: 14px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* ── FORM ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(61,142,255,0.5);
    background: rgba(61,142,255,0.06);
  }
  .form-select option { background: #0d1a2e; color: var(--text); }
  .form-textarea { min-height: 70px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary {
    width: 100%;
    background: rgba(61,142,255,0.85);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 4px;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: rgba(61,142,255,1); transform: translateY(-1px); }

  .btn-danger { background: rgba(224,108,117,0.8); }
  .btn-danger:hover { background: rgba(224,108,117,1); }

  .btn-secondary {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .err { color: #f0908a; font-size: 12px; margin-top: 8px; text-align: center; }

  /* ── PW TOGGLE ── */
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px;
  }

  /* ── SITE NAME PREVIEW ── */
  .site-name-preview {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-top: 6px;
  }
  .site-name-preview span { color: var(--accent); }

  /* ── ITEM DETAIL MODAL ── */
  .detail-modal {
    background: rgba(8,15,30,0.92);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 24px;
    padding: 0;
    width: 400px;
    max-width: 96vw;
    max-height: 92vh;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    position: relative;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    animation: popIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  .detail-hero {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 28px 24px;
    gap: 10px;
  }

  .detail-hero-bg {
    position: absolute;
    inset: 0;
    opacity: 0.07;
    pointer-events: none;
  }

  .detail-img {
    width: 96px;
    height: 96px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    overflow: hidden;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .detail-img img { width: 100%; height: 100%; object-fit: contain; }

  .detail-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .detail-rarity-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spin-cw 3s linear infinite;
    position: relative;
    z-index: 1;
  }
  .detail-rarity-badge.common    { background-image: conic-gradient(from var(--angle), #888, #ccc, #eee, #bbb, #888); }
  .detail-rarity-badge.uncommon  { background-image: conic-gradient(from var(--angle), #1a6b2a, #3ecf8e, #7dffc5, #3ecf8e, #1a6b2a); }
  .detail-rarity-badge.rare      { background-image: conic-gradient(from var(--angle), #0a3a8a, #2a7fff, #7ec8ff, #2a7fff, #0a3a8a); }
  .detail-rarity-badge.epic      { background-image: conic-gradient(from var(--angle), #3b0a6b, #a855f7, #d8a8ff, #a855f7, #3b0a6b); }
  .detail-rarity-badge.legendary { background-image: conic-gradient(from var(--angle), #7a4a00, #f5a623, #ffe58a, #f5a623, #7a4a00); }
  .detail-rarity-badge.mythic    { background-image: conic-gradient(from var(--angle), #7a2a00, #ff6b35, #ffb347, #ff6b35, #7a2a00); animation-duration: 2s; }
  .detail-rarity-badge.divine    { background-image: conic-gradient(from var(--angle), #7a1050, #e94fa0, #ffaadd, #e94fa0, #7a1050); animation-duration: 1.8s; }

  .detail-value-block {
    background: rgba(61,142,255,0.08);
    border: 1px solid rgba(61,142,255,0.18);
    border-radius: 14px;
    padding: 14px 20px;
    text-align: center;
    margin: 0 20px;
  }
  .detail-value-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-value-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .detail-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 20px 24px;
  }

  .detail-stat-cell {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .detail-stat-cell-label {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .detail-stat-cell-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .detail-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 20px;
  }

  /* ── PRICE CHART ── */
  .detail-chart-section {
    padding: 0 20px 24px;
  }
  .chart-range-btns {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .chart-range-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chart-range-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }
  .chart-range-btn.active { background: rgba(61,142,255,0.18); border-color: rgba(61,142,255,0.4); color: var(--accent); }
  .chart-canvas-wrap {
    position: relative;
    width: 100%;
    height: 160px;
  }
  .chart-no-data {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 140px;
    color: var(--muted);
    font-size: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px dashed rgba(255,255,255,0.08);
    border-radius: 12px;
  }

  /* ── TOGGLE SWITCH ── */
  .toggle-wrap { cursor:pointer; }
  .toggle-track {
    width: 32px; height: 18px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  .toggle-track.on { background: rgba(61,142,255,0.4); border-color: rgba(61,142,255,0.6); }
  .toggle-thumb {
    width: 12px; height: 12px;
    background: var(--muted);
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-track.on .toggle-thumb { transform: translateX(14px); background: var(--accent); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script>
// ─── STATE ───────────────────────────────────────────────
const DEFAULT_PW = "admin123";

const DEFAULT_STATE = {
  password: DEFAULT_PW,
  siteName1: "Value",
  siteName2: "List",
  siteDomain: ".gg",
  categories: ["Weapons", "Bags", "Armor", "Special"],
  items: [
    { id: uid(), name: "Cape Bag", emoji: "🎽", img: "", type: "Bags", value: 150000, demand: "Amazing", supply: 82, stability: "Overpaid", rarity: "legendary" },
    { id: uid(), name: "Ouroboros Bag", emoji: "🛡️", img: "", type: "Bags", value: 50000, demand: "Below Average", supply: 21, stability: "Fluctuating", rarity: "epic" },
    { id: uid(), name: "Twin Sai", emoji: "⚔️", img: "", type: "Weapons", value: 41000, demand: "Very High", supply: 84, stability: "Overpaid", rarity: "legendary" },
    { id: uid(), name: "Ghost Karambit", emoji: "🗡️", img: "", type: "Weapons", value: 37000, demand: "Very High", supply: 100, stability: "Rising", rarity: "rare" },
    { id: uid(), name: "Dual Bayonet", emoji: "🔪", img: "", type: "Weapons", value: 36000, demand: "Very High", supply: 124, stability: "Overpaid", rarity: "legendary" },
    { id: uid(), name: "Present Karambit", emoji: "🎁", img: "", type: "Weapons", value: 30500, demand: "Amazing", supply: 194, stability: "Overpaid", rarity: "rare" },
    { id: uid(), name: "Cartoon Armor", emoji: "🦺", img: "", type: "Armor", value: 30000, demand: "Amazing", supply: 255, stability: "Overpaid", rarity: "epic" },
    { id: uid(), name: "Celestial Chakram", emoji: "💫", img: "", type: "Weapons", value: 25000, demand: "Good", supply: 76, stability: "Fluctuating", rarity: "legendary" },
    { id: uid(), name: "Megalith Voucher", emoji: "📜", img: "", type: "Special", value: 22500, demand: "Below Average", supply: 89, stability: "Fluctuating", rarity: "rare" },
    { id: uid(), name: "Skyforged Karambit", emoji: "🌌", img: "", type: "Weapons", value: 21000, demand: "Good", supply: 51, stability: "Overpaid", rarity: "epic" },
  ],
  history: {}
};

function loadState() {
  try {
    const saved = localStorage.getItem('valuelist_state');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

function saveState() {
  try { localStorage.setItem('valuelist_state', JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

let isAdmin = false;
let activeCategory = "Weapons";
let editingId = null;
let confirmCallback = null;

function uid() { return Math.random().toString(36).slice(2,10); }
function fmt(n) { return Number(n).toLocaleString(); }

const demandOrder = { Amazing:5, "Very High":4, High:3, Good:2, "Below Average":1, Low:0 };

// ─── RENDER ──────────────────────────────────────────────
function renderTabs() {
  if (!state.categories.includes(activeCategory)) {
    activeCategory = state.categories[0] || "";
  }
  const wrap = document.getElementById("tabsWrap");
  wrap.innerHTML = state.categories.map(c =>
    `<div class="tab${activeCategory===c?' active':''}" onclick="setCategory('${c}')">${c}</div>`
  ).join("");
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  render();
}

function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const rarity = document.getElementById("rarityFilter").value;
  const sort = document.getElementById("sortFilter").value;

  let items = state.items.filter(i => {
    if (q && !i.name.toLowerCase().includes(q)) return false;
    if (rarity && i.rarity !== rarity) return false;
    if (activeCategory && i.type !== activeCategory) return false;
    return true;
  });

  items.sort((a, b) => {
    if (sort === "value_desc") return b.value - a.value;
    if (sort === "value_asc") return a.value - b.value;
    if (sort === "demand") return (demandOrder[b.demand]||0) - (demandOrder[a.demand]||0);
    if (sort === "supply_asc") return b.supply - a.supply;
    if (sort === "name") return a.name.localeCompare(b.name);
    return 0;
  });

  const grid = document.getElementById("grid");
  if (!items.length) {
    grid.innerHTML = '<div class="empty">No items found</div>';
    return;
  }

  grid.innerHTML = items.map(i => `
    <div class="card" data-id="${i.id}" data-rarity="${i.rarity}" onclick="if(!isAdmin)openItemDetail('${i.id}')" style="cursor:${isAdmin?'default':'pointer'}">
      <div class="card-actions">
        <button class="card-act-btn edit-btn" onclick="event.stopPropagation();openEditCard('${i.id}')">✏️</button>
        <button class="card-act-btn del-btn" onclick="event.stopPropagation();confirmDeleteCard('${i.id}')">🗑</button>
      </div>
      <div class="card-img">${i.img ? `<img src="${i.img}" onerror="this.parentElement.innerHTML='${i.emoji||'❓'}'"/>` : (i.emoji||'❓')}</div>
      <div class="card-name">${i.name}</div>
      <div class="card-value">Value: <strong>${fmt(i.value)}</strong></div>
      <div class="card-stats">
        <div class="stat-row"><span class="stat-label">Demand:</span><span>${i.demand}</span></div>
        <div class="stat-row"><span class="stat-label">Stability:</span><span class="stab-${i.stability}">${i.stability}</span></div>
        <div class="stat-row"><span class="stat-label">Rarity:</span><span class="rarity-text ${i.rarity}">${i.rarity.charAt(0).toUpperCase() + i.rarity.slice(1)}</span></div>
      </div>
    </div>
  `).join("");
}

function renderLogo() {
  document.getElementById("logoEl").innerHTML =
    state.siteName1 + `<span>${state.siteName2}</span>` + state.siteDomain;
  document.title = state.siteName1 + state.siteName2 + state.siteDomain;

// ─── ADMIN ───────────────────────────────────────────────
function openAdminLogin() {
  if (isAdmin) { logoutAdmin(); return; }
  document.getElementById("loginPw").value = "";
  document.getElementById("loginErr").textContent = "";
  modalOpen("loginOverlay");
}

function doLogin() {
  const pw = document.getElementById("loginPw").value;
  if (pw === state.password) {
    isAdmin = true;
    modalClose("loginOverlay");
    document.getElementById("adminToggleBtn").textContent = "⚙ Admin ✓";
    document.getElementById("adminToggleBtn").classList.add("active");
    document.getElementById("adminPanel").classList.add("open");
    document.body.classList.add("admin-mode");
  } else {
    document.getElementById("loginErr").textContent = "Incorrect password.";
    document.getElementById("loginPw").value = "";
  }
}

function logoutAdmin() {
  isAdmin = false;
  document.getElementById("adminToggleBtn").textContent = "⚙ Admin";
  document.getElementById("adminToggleBtn").classList.remove("active");
  document.getElementById("adminPanel").classList.remove("open");
  document.body.classList.remove("admin-mode");
}

function openChangePw() {
  document.getElementById("cpCurrent").value = "";
  document.getElementById("cpNew").value = "";
  document.getElementById("cpConfirm").value = "";
  document.getElementById("cpErr").textContent = "";
  modalOpen("changePwOverlay");
}

function doChangePw() {
  const cur = document.getElementById("cpCurrent").value;
  const nw = document.getElementById("cpNew").value;
  const cf = document.getElementById("cpConfirm").value;
  if (cur !== state.password) { document.getElementById("cpErr").textContent = "Current password is wrong."; return; }
  if (!nw) { document.getElementById("cpErr").textContent = "New password cannot be empty."; return; }
  if (nw !== cf) { document.getElementById("cpErr").textContent = "Passwords do not match."; return; }
  state.password = nw;
  saveState();
  modalClose("changePwOverlay");
  showToast("Password updated ✓");
}

// ─── SITE SETTINGS ───────────────────────────────────────
function openSiteSettings() {
  document.getElementById("ssName1").value = state.siteName1;
  document.getElementById("ssName2").value = state.siteName2;
  document.getElementById("ssDomain").value = state.siteDomain;
  updateNamePreview();
  modalOpen("siteSettingsOverlay");
}

function updateNamePreview() {
  const n1 = document.getElementById("ssName1").value || "Value";
  const n2 = document.getElementById("ssName2").value || "List";
  const d = document.getElementById("ssDomain").value || ".gg";
  document.getElementById("namePreview").innerHTML = n1 + `<span>${n2}</span>` + d;
}

function saveSiteSettings() {
  state.siteName1 = document.getElementById("ssName1").value || "Value";
  state.siteName2 = document.getElementById("ssName2").value || "List";
  state.siteDomain = document.getElementById("ssDomain").value || ".gg";
  saveState();
  renderLogo();
  modalClose("siteSettingsOverlay");

// ─── CATEGORIES ──────────────────────────────────────────
function openManageCategories() {
  renderCatList();
  document.getElementById("newCatInput").value = "";
  document.getElementById("catErr").textContent = "";
  modalOpen("catOverlay");
}

function renderCatList() {
  const list = document.getElementById("catList");
  const cats = state.categories;
  list.innerHTML = cats.map(c => `
    <div class="cat-chip">
      ${c}
      <button class="cat-chip-del" onclick="confirmDeleteCat('${c}')">✕</button>
    </div>
  `).join("") || '<span style="color:var(--muted);font-size:12px;">No categories yet</span>';
}

function addCategory() {
  const val = document.getElementById("newCatInput").value.trim();
  if (!val) { document.getElementById("catErr").textContent = "Enter a name."; return; }
  if (state.categories.includes(val)) { document.getElementById("catErr").textContent = "Already exists."; return; }
  state.categories.push(val);
  saveState();
  document.getElementById("newCatInput").value = "";
  document.getElementById("catErr").textContent = "";
  renderCatList();
  renderTabs();
  showToast(`Category "${val}" added ✓`);
}

function confirmDeleteCat(cat) {
  const count = state.items.filter(i => i.type === cat).length;
  document.getElementById("confirmTitle").textContent = `Delete "${cat}"?`;
  document.getElementById("confirmMsg").textContent = count > 0
    ? `This will delete ${count} item(s) in this category.`
    : "This category has no items.";
  confirmCallback = () => {
    state.items = state.items.filter(i => i.type !== cat);
    state.categories = state.categories.filter(c => c !== cat);
    saveState();
    if (activeCategory === cat) activeCategory = state.categories.find(c => c !== cat) || "";
    renderCatList();
    renderTabs();
    render();
    modalClose("confirmOverlay");
    showToast(`"${cat}" deleted`);
  };
  modalOpen("confirmOverlay");
  document.getElementById("confirmYes").onclick = confirmCallback;
}

// ─── CARDS ───────────────────────────────────────────────
function populateCatSelect(selected) {
  const sel = document.getElementById("ciCategory");
  sel.innerHTML = state.categories.map(c =>
    `<option${c===selected?' selected':''}>${c}</option>`
  ).join("");
}

function openAddCard() {
  editingId = null;
  document.getElementById("cardModalTitle").textContent = "+ Add Item";
  document.getElementById("ciName").value = "";
  document.getElementById("ciValue").value = "";

  resetIconPicker("", "");

  document.getElementById("ciDemand").value = "Good";
  document.getElementById("ciStability").value = "Stable";

  document.getElementById("cardErr").textContent = "";
  document.getElementById("cardDelBtn").style.display = "none";

function openEditCard(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById("cardModalTitle").textContent = "✏️ Edit Item";

// ─── FIELD VISIBILITY TOGGLES ────────────────────────────
const VIS_FIELDS = ['value','demand','stability','desc','chart'];
let ciVis = { value:true, demand:true, stability:true, desc:true, chart:true };

function setVis(field, val) {
  ciVis[field] = val;
  const track = document.getElementById('visTrack_'+field);
  const label = document.getElementById('visLabel_'+field);
  if (track) track.classList.toggle('on', val);
  if (label) label.textContent = val ? 'Visible' : 'Hidden';
}

function toggleVis(field) {
  setVis(field, !ciVis[field]);
}

function resetVisUI(visObj) {
  ciVis = Object.assign({ value:true, demand:true, stability:true, desc:true, chart:true }, visObj||{});
  VIS_FIELDS.forEach(f => setVis(f, ciVis[f]));
}

// keep old names working
function updateDescToggleUI() { setVis('desc', ciVis.desc); }
function toggleDescVis() { toggleVis('desc'); }

function saveCard() {
  const name = document.getElementById("ciName").value.trim();
  const value = parseFloat(document.getElementById("ciValue").value);
  const supply = parseInt(document.getElementById("ciSupply").value);
  if (!name) { document.getElementById("cardErr").textContent = "Name is required."; return; }
  if (isNaN(value) || value < 0) { document.getElementById("cardErr").textContent = "Enter a valid value."; return; }
  if (isNaN(supply) || supply < 0) { document.getElementById("cardErr").textContent = "Enter a valid supply."; return; }

  const item = {
    id: editingId || uid(),
    name,
    value,
    supply,
    emoji: document.getElementById("ciEmoji").value || "❓",
    img: currentImgBase64 || document.getElementById("ciImg").value.trim(),
    rarity: document.getElementById("ciRarity").value,
    type: document.getElementById("ciCategory").value,
    demand: document.getElementById("ciDemand").value,
    stability: document.getElementById("ciStability").value,
    desc: document.getElementById("ciDesc").value.trim(),
    vis: Object.assign({}, ciVis),
  };

  if (editingId) {
    const prev = state.items.find(i => i.id === editingId);
    if (prev && prev.value !== item.value) recordHistory(item.id, item.value);
    const idx = state.items.findIndex(i => i.id === editingId);
    state.items[idx] = item;
    saveState();
    showToast("Item updated ✓");
  } else {
    recordHistory(item.id, item.value);
    state.items.unshift(item);
    saveState();
    showToast("Item added ✓");
  }

  modalClose("cardOverlay");
  render();
}

function confirmDeleteCard(id) {
  const item = state.items.find(i => i.id === id);
  modalClose("cardOverlay");
  document.getElementById("confirmTitle").textContent = `Delete "${item.name}"?`;
  document.getElementById("confirmMsg").textContent = "This cannot be undone.";
  confirmCallback = () => {
    state.items = state.items.filter(i => i.id !== id);
    saveState();
    render();
    modalClose("confirmOverlay");
    showToast(`"${item.name}" deleted`);
  };
  modalOpen("confirmOverlay");
  document.getElementById("confirmYes").onclick = confirmCallback;
}

function deleteCard() {
  if (editingId) confirmDeleteCard(editingId);
}

// ─── PRICE HISTORY ───────────────────────────────────────
// history stored as: state.history[itemId] = [{t: timestamp_ms, v: value}, ...]

let detailChartRange = '1m';
let detailChartInstance = null;
let detailChartItemId = null;

function recordHistory(itemId, value) {
  if (!state.history) state.history = {};
  if (!state.history[itemId]) state.history[itemId] = [];
  state.history[itemId].push({ t: Date.now(), v: value });
  saveState();
}

function setChartRange(range, btn) {
  detailChartRange = range;
  document.querySelectorAll('.chart-range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawChart(detailChartItemId);
}

function filterHistory(history, range) {
  if (!history || !history.length) return [];
  const now = Date.now();
  const ms = { '1m': 30, '3m': 90, '6m': 180, '1y': 365 };
  if (range === 'all') return history;
  const cutoff = now - ms[range] * 86400000;
  return history.filter(p => p.t >= cutoff);
}

function drawChart(itemId) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return;
  if (!state.history) state.history = {};

  const raw = state.history[itemId] || [];
  const canvas = document.getElementById('detailChart');
  const noData = document.getElementById('chartNoData');
  if (!canvas || !noData) return;

  if (detailChartInstance) { try { detailChartInstance.destroy(); } catch(e){} detailChartInstance = null; }

  if (raw.length === 0) {
    canvas.style.display = 'none';
    noData.style.display = 'flex';
    return;
  }

  const now = Date.now();
  const rangeDays = { '1m':30,'3m':90,'6m':180,'1y':365 };
  let pts = raw;
  if (detailChartRange !== 'all' && rangeDays[detailChartRange]) {
    const cutoff = now - rangeDays[detailChartRange] * 86400000;
    pts = raw.filter(p => p.t >= cutoff);
    if (pts.length === 0) pts = [raw[raw.length - 1]];
  }

  noData.style.display = 'none';
  canvas.style.display = 'block';
  canvas.style.width = '100%';
  canvas.style.height = '160px';

  const labels = pts.map(p => {
    const d = new Date(p.t);
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  });
  const values = pts.map(p => p.v);

  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 160);
  grad.addColorStop(0, 'rgba(62,207,142,0.3)');
  grad.addColorStop(1, 'rgba(62,207,142,0.0)');

  detailChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: '#3ecf8e',
        borderWidth: 2,
        pointRadius: pts.length <= 10 ? 3 : 0,
        pointHoverRadius: 5,
        pointBackgroundColor: '#3ecf8e',
        fill: true,
        backgroundColor: grad,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(5,12,23,0.95)',
          borderColor: 'rgba(62,207,142,0.5)',
          borderWidth: 1,
          titleColor: '#3ecf8e',
          bodyColor: '#e8f2ff',
          padding: 10,
          callbacks: { label: c => '  Value: ' + Number(c.parsed.y).toLocaleString() }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: 'rgba(255,255,255,0.35)', font: { size: 9, family: 'Inter' }, maxTicksLimit: 6, maxRotation: 0 }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: 'rgba(255,255,255,0.35)', font: { size: 9, family: 'Inter' }, maxTicksLimit: 5, callback: v => Number(v).toLocaleString() }
        }
      }
    }
  });
}

// ─── ITEM DETAIL ─────────────────────────────────────────
function openItemDetail(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;

  // icon
  const imgEl = document.getElementById("detailImg");
  imgEl.innerHTML = item.img
    ? `<img src="${item.img}" onerror="this.parentElement.innerHTML='${item.emoji||'❓'}'" />`
    : (item.emoji || '❓');

  // hero background gradient by rarity
  const rarityColors = {
    common: '#888,#ccc', uncommon: '#1a6b2a,#3ecf8e', rare: '#0a3a8a,#2a7fff',
    epic: '#3b0a6b,#a855f7', legendary: '#7a4a00,#f5a623', mythic: '#7a2a00,#ff6b35', divine: '#7a1050,#e94fa0'
  };
  const col = rarityColors[item.rarity] || '30,30,60';
  document.getElementById("detailHeroBg").style.background =
    `radial-gradient(ellipse at 50% 0%, rgba(${col.split(',').map(c=>`${parseInt(c.trim().slice(1),16)>>16},${(parseInt(c.trim().slice(1),16)>>8)&255},${parseInt(c.trim().slice(1),16)&255}`).join(' / ')}, 0.4) 0%, transparent 70%)`;

  document.getElementById("detailName").textContent = item.name;
  document.getElementById("detailRarity").textContent = item.rarity.charAt(0).toUpperCase() + item.rarity.slice(1);
  document.getElementById("detailRarity").className = `detail-rarity-badge ${item.rarity}`;
  document.getElementById("detailValue").textContent = fmt(item.value);
  document.getElementById("detailDemand").textContent = item.demand;

  const stabEl = document.getElementById("detailStability");
  stabEl.textContent = item.stability;
  stabEl.className = `detail-stat-cell-value stab-${item.stability}`;

  detailChartItemId = id;
  detailChartRange = '1m';
  document.querySelectorAll('.chart-range-btn').forEach((b,i) => b.classList.toggle('active', i === 0));

  modalOpen("itemDetailOverlay");
  // Draw after the overlay is visible so canvas has dimensions
  requestAnimationFrame(() => drawChart(id));
}

// ─── HELPERS ─────────────────────────────────────────────
function modalOpen(id) { document.getElementById(id).classList.add("open"); document.getElementById('grid').style.pointerEvents = 'none'; }
function modalClose(id) {
  document.getElementById(id).classList.remove("open");
  if (!document.querySelector(".overlay.open")) {
    document.getElementById('grid').style.pointerEvents = '';
  }
}

document.querySelectorAll(".overlay").forEach(el => {
  el.addEventListener("mousedown", e => { if (e.target === el) modalClose(el.id); });
});

document.querySelectorAll(".modal").forEach(el => {
  el.addEventListener("mousedown", e => e.stopPropagation());
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.querySelectorAll(".overlay.open").forEach(el => modalClose(el.id));
});

function togglePw(inputId, btn) {
  const el = document.getElementById(inputId);
  el.type = el.type === "password" ? "text" : "password";
}

// ─── ICON PICKER ─────────────────────────────────────────
let currentImgBase64 = "";

function setIconPreview(src, isEmoji) {
  const p = document.getElementById("iconPreview");
  if (isEmoji) {
    p.innerHTML = src || "❓";
    p.style.fontSize = "30px";
  } else {
    p.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:contain;border-radius:8px;" />`;
  }
}

function handleImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentImgBase64 = e.target.result;
    document.getElementById("ciImg").value = "";
    document.getElementById("ciEmoji").value = "";
    setIconPreview(currentImgBase64, false);
  };
  reader.readAsDataURL(file);
}

function handleEmojiInput(input) {
  currentImgBase64 = "";
  document.getElementById("ciImg").value = "";
  document.getElementById("ciImgFile").value = "";
  setIconPreview(input.value || "❓", true);
}

function handleUrlInput(input) {
  currentImgBase64 = "";
  document.getElementById("ciEmoji").value = "";
  document.getElementById("ciImgFile").value = "";
  setIconPreview(input.value || "❓", false);
}

function resetIconPicker(emoji, imgUrl) {
  currentImgBase64 = "";
  document.getElementById("ciImgFile").value = "";
  document.getElementById("ciEmoji").value = emoji || "";
  document.getElementById("ciImg").value = imgUrl || "";
  if (imgUrl) setIconPreview(imgUrl, false);
  else setIconPreview(emoji || "❓", true);
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast";
    t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2a3f;border:1px solid var(--accent);color:var(--text);font-size:13px;padding:10px 20px;border-radius:8px;z-index:999;transition:opacity 0.3s;";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = "0"; }, 2200);
}


function seedHistoryIfEmpty() {
  if (!state.history) state.history = {};
  state.items.forEach(item => {
    if (!state.history[item.id] || state.history[item.id].length === 0) {
      // Generate 10 plausible past data points over last 6 months
      const points = [];
      const now = Date.now();
      const sixMonths = 180 * 86400000;
      for (let i = 10; i >= 0; i--) {
        const t = now - (sixMonths / 10) * i;
        const noise = (Math.random() - 0.5) * item.value * 0.15;
        const v = Math.max(0, Math.round(item.value * (0.75 + 0.25 * (i/10)) + noise));
        points.push({ t, v });
      }
      points.push({ t: now, v: item.value });
      state.history[item.id] = points;
    }
  });
  saveState();
}

// ─── INIT ────────────────────────────────────────────────
seedHistoryIfEmpty();
renderLogo();
renderTabs();
render();
