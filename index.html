<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ValueList.gg</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg1: #050c17;
    --bg2: #0a1628;
    --glass: rgba(255,255,255,0.04);
    --glass-hover: rgba(255,255,255,0.07);
    --glass-strong: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-bright: rgba(255,255,255,0.16);
    --text: #e8f2ff;
    --text-dim: rgba(232,242,255,0.55);
    --muted: rgba(255,255,255,0.3);
    --accent: #3d8eff;
    --admin: #ff6b35;
    --rising: #3ecf8e;
    --overpaid: #60b4f5;
    --fluctuating: #f59e0b;
    --stable: #66cc88;
    --declining: #e06c75;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg1);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ambient background orbs ── */
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    top: -200px; left: -150px;
    background: radial-gradient(circle, rgba(61,142,255,0.12) 0%, transparent 70%);
  }
  body::after {
    width: 500px; height: 500px;
    bottom: -150px; right: -100px;
    background: radial-gradient(circle, rgba(168,85,247,0.09) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  .header {
    background: rgba(5,12,23,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-image: var(--logo-gradient, linear-gradient(90deg, #e8f2ff, #3d8eff));
  }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .admin-btn {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--admin);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .admin-btn:hover { background: rgba(255,107,53,0.2); }
  .admin-btn.active { background: var(--admin); color: #fff; border-color: var(--admin); }

  /* ── TABS ── */
  .tabs-wrap {
    background: rgba(5,12,23,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }

  .tab {
    padding: 13px 18px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
    letter-spacing: 0.3px;
  }
  .tab:hover { color: rgba(232,242,255,0.75); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 28px 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .search {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
  }
  .search:focus { border-color: rgba(61,142,255,0.5); background: var(--glass-hover); }
  .search::placeholder { color: var(--muted); }

  select.filt {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 9px 12px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    backdrop-filter: blur(8px);
  }
  select.filt:focus { border-color: rgba(61,142,255,0.5); }
  select.filt option { background: #0d1a2e; color: var(--text); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(195px, 195px));
    justify-items: center;
    justify-content: center;
    gap: 14px;
    padding: 10px 28px 48px;
    position: relative;
    z-index: 1;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    position: relative;
    cursor: default;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .card:hover {
    background: var(--glass-hover);
    border-color: var(--border-bright);
    transform: translateY(-2px);
  }

  .card-img {
    width: 76px;
    height: 76px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: contain; }

  .card-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.3px;
    color: #fff;
    -webkit-text-stroke: 0.4px rgba(0,0,0,0.6);
  }

  .card-value {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2px;
  }
  .card-value strong {
    color: rgba(232,242,255,0.85);
    font-weight: 500;
  }

  .card-stats {
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 10px;
    margin-top: 2px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11px;
  }
  .stat-row { display: flex; justify-content: space-between; align-items: center; }
  .stat-label { color: var(--muted); font-size: 10.5px; }

  /* ── RARITY GRADIENT TEXT ── */
  @property --angle {
    syntax: "<angle>";
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes spin-cw { to { --angle: 360deg; } }

  .rarity-text {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spin-cw 3s linear infinite;
  }
  .rarity-text.common    { background-image: conic-gradient(from var(--angle), #888, #ccc, #eee, #bbb, #888); }
  .rarity-text.uncommon  { background-image: conic-gradient(from var(--angle), #1a6b2a, #3ecf8e, #7dffc5, #3ecf8e, #1a6b2a); }
  .rarity-text.rare      { background-image: conic-gradient(from var(--angle), #0a3a8a, #2a7fff, #7ec8ff, #2a7fff, #0a3a8a); }
  .rarity-text.epic      { background-image: conic-gradient(from var(--angle), #3b0a6b, #a855f7, #d8a8ff, #a855f7, #3b0a6b); }
  .rarity-text.legendary { background-image: conic-gradient(from var(--angle), #7a4a00, #f5a623, #ffe58a, #f5a623, #7a4a00); }
  .rarity-text.mythic    { background-image: conic-gradient(from var(--angle), #7a2a00, #ff6b35, #ffb347, #ff6b35, #7a2a00); animation-duration: 2s; }
  .rarity-text.divine    { background-image: conic-gradient(from var(--angle), #7a1050, #e94fa0, #ffaadd, #e94fa0, #7a1050); animation-duration: 1.8s; }

  .stab-Rising     { color: var(--rising); }
  .stab-Overpaid   { color: var(--overpaid); }
  .stab-Fluctuating{ color: var(--fluctuating); }
  .stab-Stable     { color: var(--stable); }
  .stab-Declining  { color: var(--declining); }

  /* ── ADMIN CARD ACTIONS ── */
  .card-actions {
    position: absolute;
    top: 10px; right: 10px;
    display: none;
    gap: 5px;
  }
  .admin-mode .card:hover .card-actions { display: flex; }
  .card-act-btn {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    transition: all 0.15s;
  }
  .card-act-btn:hover { border-color: rgba(255,255,255,0.2); transform: scale(1.1); }
  .edit-btn { background: rgba(42,127,255,0.2); color: #7ec8ff; }
  .del-btn  { background: rgba(224,108,117,0.2); color: #f0a0a0; }

  /* ── EMPTY ── */
  .empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 4rem; font-size: 14px; }

  /* ── ADMIN PANEL ── */
  .admin-panel {
    background: rgba(255,107,53,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,107,53,0.2);
    padding: 10px 28px;
    display: none;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .admin-panel.open { display: flex; }
  .admin-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--admin);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .ap-btn {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 20px;
    color: rgba(255,150,100,0.9);
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    padding: 5px 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .ap-btn:hover { background: rgba(255,107,53,0.2); border-color: rgba(255,107,53,0.4); color: #ff8c60; }

  .ap-btn-blue {
    background: rgba(61,142,255,0.1);
    border-color: rgba(61,142,255,0.25);
    color: rgba(120,180,255,0.9);
  }
  .ap-btn-blue:hover { background: rgba(61,142,255,0.2); border-color: rgba(61,142,255,0.4); color: #7ec8ff; }

  /* ── CATEGORY CHIPS ── */
  .cat-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .cat-chip-del {
    background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 1px;
  }
  .cat-chip-del:hover { color: #e06c75; }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(3,8,18,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: rgba(10,18,35,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    animation: popIn 0.2s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
  }
  @keyframes popIn { from { transform: scale(0.93) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 22px;
    color: var(--text);
    letter-spacing: 0.4px;
  }

  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--muted);
    font-size: 14px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* ── FORM ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(61,142,255,0.5);
    background: rgba(61,142,255,0.06);
  }
  .form-select option { background: #0d1a2e; color: var(--text); }
  .form-textarea { min-height: 70px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary {
    width: 100%;
    background: rgba(61,142,255,0.85);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 4px;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: rgba(61,142,255,1); transform: translateY(-1px); }

  .btn-danger { background: rgba(224,108,117,0.8); }
  .btn-danger:hover { background: rgba(224,108,117,1); }

  .btn-secondary {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .err { color: #f0908a; font-size: 12px; margin-top: 8px; text-align: center; }

  /* ── PW TOGGLE ── */
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px;
  }

  /* ── SITE NAME PREVIEW ── */


  /* ── ITEM DETAIL MODAL ── */
  .detail-modal {
    background: rgba(8,15,30,0.92);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 24px;
    padding: 0;
    width: 400px;
    max-width: 96vw;
    max-height: 92vh;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    position: relative;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    animation: popIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  .detail-hero {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 28px 24px;
    gap: 10px;
  }

  .detail-hero-bg {
    position: absolute;
    inset: 0;
    opacity: 0.07;
    pointer-events: none;
  }

  .detail-img {
    width: 96px;
    height: 96px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    overflow: hidden;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .detail-img img { width: 100%; height: 100%; object-fit: contain; }

  .detail-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .detail-rarity-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spin-cw 3s linear infinite;
    position: relative;
    z-index: 1;
  }
  .detail-rarity-badge.common    { background-image: conic-gradient(from var(--angle), #888, #ccc, #eee, #bbb, #888); }
  .detail-rarity-badge.uncommon  { background-image: conic-gradient(from var(--angle), #1a6b2a, #3ecf8e, #7dffc5, #3ecf8e, #1a6b2a); }
  .detail-rarity-badge.rare      { background-image: conic-gradient(from var(--angle), #0a3a8a, #2a7fff, #7ec8ff, #2a7fff, #0a3a8a); }
  .detail-rarity-badge.epic      { background-image: conic-gradient(from var(--angle), #3b0a6b, #a855f7, #d8a8ff, #a855f7, #3b0a6b); }
  .detail-rarity-badge.legendary { background-image: conic-gradient(from var(--angle), #7a4a00, #f5a623, #ffe58a, #f5a623, #7a4a00); }
  .detail-rarity-badge.mythic    { background-image: conic-gradient(from var(--angle), #7a2a00, #ff6b35, #ffb347, #ff6b35, #7a2a00); animation-duration: 2s; }
  .detail-rarity-badge.divine    { background-image: conic-gradient(from var(--angle), #7a1050, #e94fa0, #ffaadd, #e94fa0, #7a1050); animation-duration: 1.8s; }

  .detail-value-block {
    background: rgba(61,142,255,0.08);
    border: 1px solid rgba(61,142,255,0.18);
    border-radius: 14px;
    padding: 14px 20px;
    text-align: center;
    margin: 0 20px;
  }
  .detail-value-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-value-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .detail-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 20px 24px;
  }

  .detail-stat-cell {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .detail-stat-cell-label {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .detail-stat-cell-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .detail-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 20px;
  }

  /* ── PRICE CHART ── */
  .detail-chart-section {
    padding: 0 20px 24px;
  }
  .chart-range-btns {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .chart-range-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)).then(function(buf) {
    return Array.prototype.map.call(new Uint8Array(buf), function(b) {
      return ("00" + b.toString(16)).slice(-2);

}

function scheduleGitHubSync() {
  clearTimeout(_ghTimer);

function pushToGitHub() {

// ─── RENDER ──────────────────────────────────────────────
function renderTabs() {
  if (state.categories.indexOf(activeCategory) === -1) {
    activeCategory = state.categories[0] || "";
  }
  var wrap = document.getElementById("tabsWrap");
  var html = "";
  for (var i = 0; i < state.categories.length; i++) {
    var c = state.categories[i];
    var cls = activeCategory === c ? " active" : "";
    html += "<div class=\"tab" + cls + "\" data-cat=\"" + c + "\">" + c + "</div>";
  }
  wrap.innerHTML = html;
  var tabs = wrap.querySelectorAll(".tab");
  for (var j = 0; j < tabs.length; j++) {
    (function(tab) {
      tab.addEventListener("click", function() { setCategory(tab.getAttribute("data-cat")); });
    })(tabs[j]);
  }
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  render();
}

  var q = document.getElementById("searchInput").value.toLowerCase();

  var items = state.items.filter(function(i) {
    if (q && i.name.toLowerCase().indexOf(q) === -1) return false;
    if (rarity && i.rarity !== rarity) return false;
    if (activeCategory && i.type !== activeCategory) return false;
    return true;
  });

  items.sort(function(a, b) {
    if (sort === "value_desc") return b.value - a.value;
    if (sort === "value_asc") return a.value - b.value;
    if (sort === "demand") return (demandOrder[b.demand]||0) - (demandOrder[a.demand]||0);
    if (sort === "supply_asc") return b.supply - a.supply;
    if (sort === "name") return a.name.localeCompare(b.name);
    return 0;
  });

  var grid = document.getElementById("grid");
  if (!items.length) {
    grid.innerHTML = "<div class=\"empty\">No items found</div>";
    return;
  }

  grid.innerHTML = "";
  for (var i = 0; i < items.length; i++) {
    (function(item) {
      var card = document.createElement("div");
      card.className = "card";
      card.setAttribute("data-id", item.id);
      card.setAttribute("data-rarity", item.rarity);
      card.style.cursor = isAdmin ? "default" : "pointer";

      var imgHtml = item.img
        ? "<img src=\"" + item.img + "\" style=\"width:100%;height:100%;object-fit:contain;\" />"
        : (item.emoji || "?");

      var statsHtml = "";
      if (!item.vis || item.vis.demand !== false) {
        statsHtml += "<div class=\"stat-row\"><span class=\"stat-label\">Demand:</span><span>" + item.demand + "</span></div>";
      }
      if (!item.vis || item.vis.stability !== false) {
        statsHtml += "<div class=\"stat-row\"><span class=\"stat-label\">Stability:</span><span class=\"stab-" + item.stability + "\">" + item.stability + "</span></div>";
      }
      statsHtml += "<div class=\"stat-row\"><span class=\"stat-label\">Rarity:</span><span class=\"rarity-text " + item.rarity + "\">" + item.rarity.charAt(0).toUpperCase() + item.rarity.slice(1) + "</span></div>";
      var customs = (item.customDetails || []).filter(function(d) { return d.visible !== false && (d.label || d.value); });
      for (var k = 0; k < customs.length; k++) {
        statsHtml += "<div class=\"stat-row\"><span class=\"stat-label\">" + customs[k].label + ":</span><span>" + customs[k].value + "</span></div>";
      }

      card.innerHTML =
        "<div class=\"card-actions\">" +
          "<button class=\"card-act-btn edit-btn\" data-id=\"" + item.id + "\">&#x270F;&#xFE0F;</button>" +
          "<button class=\"card-act-btn del-btn\" data-id=\"" + item.id + "\">&#x1F5D1;</button>" +
        "</div>" +
        "<div class=\"card-img\">" + imgHtml + "</div>" +
        "<div class=\"card-name\">" + item.name + "</div>" +
        "<div class=\"card-value\">Value: <strong>" + fmt(item.value) + "</strong></div>" +
        "<div class=\"card-stats\">" + statsHtml + "</div>";

      card.querySelector(".edit-btn").addEventListener("click", function(e) {
        e.stopPropagation();
        openEditCard(item.id);
      });
      card.querySelector(".del-btn").addEventListener("click", function(e) {
        e.stopPropagation();
        confirmDeleteCard(item.id);
      });
      card.addEventListener("click", function() {
        if (!isAdmin) openItemDetail(item.id);
      });

      grid.appendChild(card);
    })(items[i]);
  }
}

var dragSrcCat = null;

function renderCatList() {
  var list = document.getElementById("catList");
  var cats = state.categories;
  if (!cats.length) {
    list.innerHTML = "<span style=\"color:var(--muted);font-size:12px;\">No categories yet</span>";
    return;
  }
  list.innerHTML = "";
  for (var i = 0; i < cats.length; i++) {
    (function(c) {
      var row = document.createElement("div");
      row.style.cssText = "display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px;cursor:grab;transition:background 0.15s,border-color 0.15s;";
      row.setAttribute("draggable", "true");

      var handle = document.createElement("span");
      handle.textContent = "\u28FF";
      handle.style.cssText = "color:var(--muted);font-size:14px;flex-shrink:0;";

      var label = document.createElement("span");
      label.textContent = c;
      label.style.cssText = "flex:1;font-size:13px;color:var(--text);";

      var delBtn = document.createElement("button");
      delBtn.textContent = "\u2715";
      delBtn.className = "cat-chip-del";
      delBtn.style.flexShrink = "0";
      delBtn.addEventListener("click", function() { confirmDeleteCat(c); });

      row.appendChild(handle);
      row.appendChild(label);
      row.appendChild(delBtn);

      row.addEventListener("dragstart", function(e) {
        dragSrcCat = c;
        row.style.opacity = "0.4";
        e.dataTransfer.effectAllowed = "move";
      });
      row.addEventListener("dragend", function() {
        row.style.opacity = "";
        var rows = list.querySelectorAll("[draggable]");
        for (var k = 0; k < rows.length; k++) rows[k].style.borderColor = "";
      });
      row.addEventListener("dragover", function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        var rows = list.querySelectorAll("[draggable]");
        for (var k = 0; k < rows.length; k++) rows[k].style.borderColor = "";
        row.style.borderColor = "rgba(61,142,255,0.5)";
      });
      row.addEventListener("dragleave", function() {
        row.style.borderColor = "";
      });
      row.addEventListener("drop", function(e) {
        e.preventDefault();
        if (!dragSrcCat || dragSrcCat === c) return;
        var srcIdx = state.categories.indexOf(dragSrcCat);
        var tgtIdx = state.categories.indexOf(c);
        if (srcIdx === -1 || tgtIdx === -1) return;
        state.categories.splice(srcIdx, 1);
        state.categories.splice(tgtIdx, 0, dragSrcCat);
        dragSrcCat = null;
        saveState();
        renderCatList();
        renderTabs();
      });

      list.appendChild(row);
    })(cats[i]);
  }
}

function addCategory() {
  var val = document.getElementById("newCatInput").value.trim();

  state.categories.push(val);

  document.getElementById("catErr").textContent = "";

  renderTabs();
  showToast("Category \"" + val + "\" added \u2713");

function confirmDeleteCat(cat) {
  var count = state.items.filter(function(i) { return i.type === cat; }).length;
  document.getElementById("confirmTitle").textContent = "Delete \"" + cat + "\"?";
  document.getElementById("confirmMsg").textContent = count > 0
    ? "This will delete " + count + " item(s) in this category."
    : "This category has no items.";
  confirmCallback = function() {
    state.items = state.items.filter(function(i) { return i.type !== cat; });
    state.categories = state.categories.filter(function(c) { return c !== cat; });
    saveState();
    if (activeCategory === cat) activeCategory = state.categories[0] || "";
    renderCatList();
    renderTabs();
    render();
    modalClose("confirmOverlay");
    showToast("\"" + cat + "\" deleted");

  document.getElementById("confirmYes").onclick = confirmCallback;
}

function saveCard() {
  var name = document.getElementById("ciName").value.trim();
  var value = parseFloat(document.getElementById("ciValue").value);
  if (!name) { document.getElementById("cardErr").textContent = "Name is required."; return; }
  if (isNaN(value) || value < 0) { document.getElementById("cardErr").textContent = "Enter a valid value."; return; }

  var item = {
    id: editingId || uid(),
    name: name,
    value: value,
    emoji: document.getElementById("ciEmoji").value || "?",
    img: currentImgBase64 || document.getElementById("ciImg").value.trim(),
    rarity: document.getElementById("ciRarity").value,
    type: document.getElementById("ciCategory").value,
    demand: document.getElementById("ciDemand").value,
    stability: document.getElementById("ciStability").value,
    desc: document.getElementById("ciDesc").value.trim(),
    vis: Object.assign({}, ciVis),
    customDetails: JSON.parse(JSON.stringify(ciCustomDetails))
  };

  if (editingId) {
    var prev = null;
    for (var i = 0; i < state.items.length; i++) { if (state.items[i].id === editingId) { prev = state.items[i]; break; } }
    if (prev && prev.value !== item.value) recordHistory(item.id, item.value);
    var idx = -1;
    for (var j = 0; j < state.items.length; j++) { if (state.items[j].id === editingId) { idx = j; break; } }
    state.items[idx] = item;
    saveState();
    if (detailChartItemId === item.id) {
      document.getElementById("detailValue").textContent = fmt(item.value);
      setTimeout(function() { drawChart(item.id); }, 30);
    }
    showToast("Item updated \u2713");
  } else {
    recordHistory(item.id, item.value);
    state.items.unshift(item);
    saveState();
    showToast("Item added \u2713");
  }

  modalClose("cardOverlay");
  render();
}

// ─── PRICE HISTORY ───────────────────────────────────────
var detailChartRange = "1m";
var detailChartInstance = null;
var detailChartItemId = null;

function recordHistory(itemId, value) {
  if (!state.history) state.history = {};
  if (!state.history[itemId]) state.history[itemId] = [];
  state.history[itemId].push({ t: Date.now(), v: value });
  saveState();
}

function setChartRange(range, btn) {
  detailChartRange = range;
  var btns = document.querySelectorAll(".chart-range-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active");
  drawChart(detailChartItemId);
}

function drawChart(itemId) {
  var item = null;
  for (var i = 0; i < state.items.length; i++) { if (state.items[i].id === itemId) { item = state.items[i]; break; } }
  if (!item) return;
  if (!state.history) state.history = {};

  var raw = state.history[itemId] || [];
  var canvas = document.getElementById("detailChart");
  var noData = document.getElementById("chartNoData");
  if (!canvas || !noData) return;

  if (detailChartInstance) { try { detailChartInstance.destroy(); } catch(e){} detailChartInstance = null; }

  if (raw.length === 0) {
    canvas.style.display = "none";
    noData.style.display = "flex";
    return;
  }

  var now = Date.now();
  var rangeDays = { "1m":30, "3m":90, "6m":180, "1y":365 };
  var pts = raw;
  if (detailChartRange !== "all" && rangeDays[detailChartRange]) {
    var cutoff = now - rangeDays[detailChartRange] * 86400000;
    pts = raw.filter(function(p) { return p.t >= cutoff; });
    if (pts.length === 0) pts = [raw[raw.length - 1]];
  }

  noData.style.display = "none";
  canvas.style.display = "block";
  canvas.style.width = "100%";
  canvas.style.height = "160px";

  var labels = pts.map(function(p) {
    return new Date(p.t).toLocaleDateString("en-GB", { day:"numeric", month:"short" });
  });
  var values = pts.map(function(p) { return p.v; });

  var ctx = canvas.getContext("2d");
  var grad = ctx.createLinearGradient(0, 0, 0, 160);
  grad.addColorStop(0, "rgba(62,207,142,0.3)");
  grad.addColorStop(1, "rgba(62,207,142,0.0)");

  detailChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: values,
        borderColor: "#3ecf8e",
        borderWidth: 2,
        pointRadius: pts.length <= 10 ? 3 : 0,
        pointHoverRadius: 5,
        pointBackgroundColor: "#3ecf8e",
        fill: true,
        backgroundColor: grad,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      plugins: {
        legend: { display: false },
        tooltip: {

// ─── ITEM DETAIL ─────────────────────────────────────────
function openItemDetail(id) {
  var item = null;
  for (var i = 0; i < state.items.length; i++) { if (state.items[i].id === id) { item = state.items[i]; break; } }
  if (!item) return;
  var vis = Object.assign({ value:true, demand:true, stability:true, desc:true, chart:true }, item.vis || {});

  var imgEl = document.getElementById("detailImg");
  imgEl.innerHTML = item.img
    ? "<img src=\"" + item.img + "\" style=\"width:100%;height:100%;object-fit:contain;\" />"
    : (item.emoji || "?");

  document.getElementById("detailHeroBg").style.background = "";

  document.getElementById("detailName").textContent = item.name;
  document.getElementById("detailRarity").textContent = item.rarity.charAt(0).toUpperCase() + item.rarity.slice(1);
  document.getElementById("detailRarity").className = "detail-rarity-badge " + item.rarity;

  var valBlock = document.getElementById("detailValueBlock");
  if (valBlock) valBlock.style.display = vis.value ? "" : "none";
  document.getElementById("detailValue").textContent = fmt(item.value);

  var demandCell = document.getElementById("detailDemandCell");
  var stabCell = document.getElementById("detailStabCell");
  if (demandCell) demandCell.style.display = vis.demand ? "" : "none";
  if (stabCell) stabCell.style.display = vis.stability ? "" : "none";
  document.getElementById("detailDemand").textContent = item.demand;
  var stabEl = document.getElementById("detailStability");
  stabEl.textContent = item.stability;
  stabEl.className = "detail-stat-cell-value stab-" + item.stability;

  var descCell = document.getElementById("detailDescCell");
  var descEl = document.getElementById("detailDesc");
  var showDesc = vis.desc && item.desc && item.desc.trim();
  descCell.style.display = showDesc ? "" : "none";
  if (showDesc) descEl.textContent = item.desc;

  var customGrid = document.getElementById("detailCustomGrid");
  var customs = (item.customDetails || []).filter(function(d) { return d.visible !== false && (d.label || d.value); });
  if (customGrid) {
    if (customs.length) {
      var cgHtml = "";
      for (var k = 0; k < customs.length; k++) {
        cgHtml += "<div class=\"detail-stat-cell\"><div class=\"detail-stat-cell-label\">" + escHtml(customs[k].label) + "</div><div class=\"detail-stat-cell-value\">" + escHtml(customs[k].value) + "</div></div>";
      }
      customGrid.innerHTML = cgHtml;
      customGrid.style.display = "";
    } else {
      customGrid.style.display = "none";
    }
  }

  var chartSection = document.getElementById("detailChartSection");
  if (chartSection) chartSection.style.display = vis.chart ? "" : "none";

  var editBtn = document.getElementById("editHistoryBtn");
  if (editBtn) editBtn.style.display = isAdmin ? "" : "none";

  detailChartItemId = id;
  detailChartRange = "1m";
  var rangeBtns = document.querySelectorAll(".chart-range-btn");
  for (var r = 0; r < rangeBtns.length; r++) rangeBtns[r].classList.toggle("active", r === 0);

  modalOpen("itemDetailOverlay");
  if (vis.chart) setTimeout(function() { drawChart(id); }, 30);
}

// ─── HELPERS ─────────────────────────────────────────────
function modalOpen(id) {
  document.getElementById(id).classList.add("open");
  document.getElementById("grid").style.pointerEvents = "none";
}
function modalClose(id) {
  document.getElementById(id).classList.remove("open");
  if (!document.querySelector(".overlay.open")) {
    document.getElementById("grid").style.pointerEvents = "";
  }
}

document.querySelectorAll(".overlay").forEach(function(el) {
  el.addEventListener("mousedown", function(e) { if (e.target === el) modalClose(el.id); });
});
document.querySelectorAll(".modal").forEach(function(el) {
  el.addEventListener("mousedown", function(e) { e.stopPropagation(); });
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    document.querySelectorAll(".overlay.open").forEach(function(el) { modalClose(el.id); });
  }
});

function togglePw(inputId) {
  var el = document.getElementById(inputId);
  el.type = el.type === "password" ? "text" : "password";
}

// ─── ICON PICKER ─────────────────────────────────────────
var currentImgBase64 = "";

function setIconPreview(src, isEmoji) {
  var p = document.getElementById("iconPreview");
  if (isEmoji) {
    p.innerHTML = src || "?";
    p.style.fontSize = "30px";
  } else {
    p.innerHTML = "<img src=\"" + src + "\" style=\"width:100%;height:100%;object-fit:contain;border-radius:8px;\" />";
  }
}

function handleImgUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    currentImgBase64 = e.target.result;
    document.getElementById("ciImg").value = "";
    document.getElementById("ciEmoji").value = "";
    setIconPreview(currentImgBase64, false);
  };
  reader.readAsDataURL(file);
}

function handleEmojiInput(input) {
  currentImgBase64 = "";
  document.getElementById("ciImg").value = "";
  document.getElementById("ciImgFile").value = "";
  setIconPreview(input.value || "?", true);
}

function handleUrlInput(input) {
  currentImgBase64 = "";
  document.getElementById("ciEmoji").value = "";
  document.getElementById("ciImgFile").value = "";
  setIconPreview(input.value || "?", false);
}

function resetIconPicker(emoji, imgUrl) {
  currentImgBase64 = "";
  document.getElementById("ciImgFile").value = "";
  document.getElementById("ciEmoji").value = emoji || "";
  document.getElementById("ciImg").value = imgUrl || "";
  if (imgUrl) setIconPreview(imgUrl, false);
  else setIconPreview(emoji || "?", true);
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById("toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast";
    t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2a3f;border:1px solid var(--accent);color:var(--text);font-size:13px;padding:10px 20px;border-radius:8px;z-index:999;transition:opacity 0.3s;";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.style.opacity = "0"; }, 2200);
}

// ─── HISTORY EDITOR ─────────────────────────────────────
function openHistoryEditor() {
  if (!detailChartItemId) return;
  renderHistoryPointsList();
  var today = new Date().toISOString().split("T")[0];
  document.getElementById("hpDate").value = today;
  document.getElementById("hpValue").value = "";
  document.getElementById("hpErr").textContent = "";
  modalOpen("historyEditorOverlay");
}

function renderHistoryPointsList() {
  if (!state.history) state.history = {};
  var allPts = (state.history[detailChartItemId] || []).slice();
  var pts = allPts.slice().sort(function(a,b) { return b.t - a.t; });
  document.getElementById("hpCount").textContent = "(" + pts.length + ")";
  var list = document.getElementById("historyPointsList");
  if (!pts.length) {
    list.innerHTML = "<div style=\"color:var(--muted);font-size:12px;text-align:center;padding:16px;\">No data points yet</div>";
    return;
  }
  list.innerHTML = "";
  for (var i = 0; i < pts.length; i++) {
    (function(p) {
      var d = new Date(p.t);
      var dateStr = d.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
      var realIdx = -1;
      var orig = state.history[detailChartItemId] || [];
      for (var k = 0; k < orig.length; k++) {
        if (orig[k].t === p.t && orig[k].v === p.v) { realIdx = k; break; }
      }

      var row = document.createElement("div");
      row.style.cssText = "display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;";

      var info = document.createElement("div");
      info.innerHTML = "<div style=\"font-size:12px;color:var(--text);\">" + fmt(p.v) + "</div><div style=\"font-size:10px;color:var(--muted);margin-top:2px;\">" + dateStr + "</div>";

      var delBtn = document.createElement("button");
      delBtn.textContent = "Delete";
      delBtn.style.cssText = "background:rgba(224,108,117,0.15);border:1px solid rgba(224,108,117,0.25);border-radius:8px;color:#f0a0a0;font-size:11px;padding:5px 10px;cursor:pointer;";
      delBtn.addEventListener("click", function() { deleteHistoryPoint(realIdx); });

      row.appendChild(info);
      row.appendChild(delBtn);
      list.appendChild(row);
    })(pts[i]);
  }
}

function addHistoryPoint() {
  var dateVal = document.getElementById("hpDate").value;
  var valStr = document.getElementById("hpValue").value;
  var errEl = document.getElementById("hpErr");
  errEl.textContent = "";
  if (!dateVal) { errEl.textContent = "Pick a date."; return; }
  var val = parseFloat(valStr);
  if (isNaN(val) || val < 0) { errEl.textContent = "Enter a valid value."; return; }
  var t = new Date(dateVal).getTime();
  if (!state.history) state.history = {};
  if (!state.history[detailChartItemId]) state.history[detailChartItemId] = [];
  state.history[detailChartItemId].push({ t: t, v: val });
  state.history[detailChartItemId].sort(function(a,b) { return a.t - b.t; });
  saveState();
  document.getElementById("hpValue").value = "";
  renderHistoryPointsList();
  drawChart(detailChartItemId);
  showToast("Point added \u2713");
}

function deleteHistoryPoint(idx) {
  if (!state.history || !state.history[detailChartItemId]) return;
  state.history[detailChartItemId].splice(idx, 1);
  saveState();
  renderHistoryPointsList();
  drawChart(detailChartItemId);
}

function clearAllHistory() {
  if (!state.history) return;
  if (!confirm("Delete ALL history points for this item?")) return;
  state.history[detailChartItemId] = [];
  saveState();
  renderHistoryPointsList();
  drawChart(detailChartItemId);
  showToast("History cleared");
}
